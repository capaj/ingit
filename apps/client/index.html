<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e1e2e" />
  <link rel="icon" href="/press-kit/favicon/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/press-kit/ingit-icon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/press-kit/png/dark/ingit-icon-180.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <title>ingit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e2e; color: #cdd6f4; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #585b70; }
    ::-webkit-scrollbar-corner { background: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // Prevent browser Ctrl+wheel zoom globally — must run before any other script
    document.addEventListener('wheel', function(e) {
      if (e.ctrlKey || e.metaKey) { e.preventDefault(); }
    }, { passive: false, capture: true });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
