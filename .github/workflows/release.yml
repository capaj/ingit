name: publish

# Build self-contained binaries and publish npm packages on every semver tag.
#   git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"
  ZIG_VERSION: "0.14.1"

jobs:
  build:
    name: build ${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux
            os: ubuntu-latest
            targets: "linux-x64 linux-arm64"
            native: true
          - id: darwin
            # Zig 0.14.x cannot link Darwin artifacts reliably on macOS 26/Xcode 26.
            os: macos-15
            targets: "darwin-x64 darwin-arm64"
            native: true
          - id: windows
            os: windows-latest
            targets: "win32-x64"
            native: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: mlugg/setup-zig@v2
        if: matrix.native
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test Windows process and git fallbacks
        if: matrix.id == 'windows'
        run: |
          bun test apps/server/test/windows-processes.test.ts apps/server/test/agent-sessions.test.ts
          bun test packages/git-core/src/repo-session.test.ts packages/git-core/src/repo-session-staging.test.ts -t "starts on main|unstaged diff of an untracked file"

      - name: Build native libraries (per target)
        if: matrix.native
        working-directory: packages/git-core
        run: |
          set -euo pipefail
          for id in ${{ matrix.targets }}; do
            case "$id" in
              linux-x64)    triple=x86_64-linux-gnu;  ext=so;;
              linux-arm64)  triple=aarch64-linux-gnu; ext=so;;
              darwin-x64)   triple=x86_64-macos;      ext=dylib;;
              darwin-arm64) triple=aarch64-macos;     ext=dylib;;
              *) echo "unknown target $id" >&2; exit 1;;
            esac
            echo "::group::zig build $id ($triple)"
            rm -rf zig-out
            zig build -Doptimize=ReleaseFast -Dtarget="$triple"
            mkdir -p "native-dist/$id"
            cp "zig-out/lib/libziggit.$ext" "native-dist/$id/"
            echo "::endgroup::"
          done

      - name: Build packages
        working-directory: apps/cli
        env:
          INGIT_VERSION: ${{ github.ref_name }}
        run: bun scripts/build.ts ${{ matrix.targets }}

      - name: Smoke test Windows executable
        if: matrix.id == 'windows'
        working-directory: apps/cli
        shell: pwsh
        run: |
          .\release\cli-win32-x64\ingit.exe --version

          $process = Start-Process -FilePath ".\release\cli-win32-x64\ingit.exe" -ArgumentList "--no-open", "--port", "48488" -PassThru -NoNewWindow
          try {
            $healthy = $false
            foreach ($attempt in 1..20) {
              try {
                $response = Invoke-RestMethod "http://127.0.0.1:48488/__ingit/health"
                if ($response.name -eq "ingit") {
                  $healthy = $true
                  break
                }
              } catch {
                Start-Sleep -Milliseconds 250
              }
            }
            if (-not $healthy) {
              throw "Windows executable did not expose a healthy server"
            }
          } finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Upload linux packages + launcher
        if: matrix.id == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: pkgs-linux
          path: |
            apps/cli/release/cli-linux-x64
            apps/cli/release/cli-linux-arm64
            apps/cli/release/cli
          if-no-files-found: error

      - name: Upload darwin packages
        if: matrix.id == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: pkgs-darwin
          path: |
            apps/cli/release/cli-darwin-x64
            apps/cli/release/cli-darwin-arm64
          if-no-files-found: error

      - name: Upload Windows package
        if: matrix.id == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: pkgs-windows
          path: |
            apps/cli/release
            !apps/cli/release/cli/**
          if-no-files-found: error

  publish:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify package contents
        working-directory: release
        run: |
          set -euo pipefail

          # actions/upload-artifact does not preserve file modes.
          chmod +x cli-linux-x64/ingit cli-linux-arm64/ingit
          chmod +x cli-darwin-x64/ingit cli-darwin-arm64/ingit
          chmod +x cli/bin/ingit.cjs

          for dir in cli-linux-x64 cli-linux-arm64 cli-darwin-x64 cli-darwin-arm64 cli-win32-x64 cli; do
            echo "::group::dry-run $dir"
            (cd "$dir" && npm pack --dry-run)
            echo "::endgroup::"
          done

      - name: Publish packages
        working-directory: release
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm_tag=latest
          case "$version" in *-*) npm_tag=next;; esac
          echo "Publishing version $version (dist-tag: $npm_tag)"

          publish_dir() {
            local dir="$1"
            local pkg
            pkg="$(node -p "require('./${dir}/package.json').name")"
            if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
              echo "${pkg}@${version} is already published; skipping"
              return
            fi

            (cd "$dir" && npm publish --access public --tag "$npm_tag")
          }

          # Platform packages first; @ingit/cli depends on them via optionalDependencies.
          for dir in cli-linux-x64 cli-linux-arm64 cli-darwin-x64 cli-darwin-arm64 cli-win32-x64; do
            echo "::group::publish $dir"
            publish_dir "$dir"
            echo "::endgroup::"
          done

          echo "::group::publish @ingit/cli"
          publish_dir cli
          echo "::endgroup::"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub release $GITHUB_REF_NAME already exists; skipping"
            exit 0
          fi

          version="${GITHUB_REF_NAME#v}"
          release_args=(
            --verify-tag
            --title "$GITHUB_REF_NAME"
            --notes-file -
          )
          case "$version" in *-*) release_args+=(--prerelease);; esac

          previous_tag="$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || true)"
          commit_range="$GITHUB_REF_NAME"
          if [[ -n "$previous_tag" ]]; then
            commit_range="$previous_tag..$GITHUB_REF_NAME"
          fi

          {
            echo "## What's changed"
            echo
            git log \
              --no-merges \
              --invert-grep \
              --grep='^release v[0-9]' \
              --pretty="format:- %s ([%h](https://github.com/$GITHUB_REPOSITORY/commit/%H))" \
              "$commit_range"

            if [[ -n "$previous_tag" ]]; then
              echo
              echo
              echo "**Full changelog:** https://github.com/$GITHUB_REPOSITORY/compare/$previous_tag...$GITHUB_REF_NAME"
            fi
          } | gh release create "$GITHUB_REF_NAME" "${release_args[@]}"
